<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <linearGradient id="lobster" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b6b"/>
      <stop offset="100%" style="stop-color:#ee5a24"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect x="4" y="4" width="120" height="120" rx="24" fill="url(#bg)"/>
  <!-- Lobster body -->
  <ellipse cx="64" cy="58" rx="22" ry="18" fill="url(#lobster)"/>
  <!-- Lobster head -->
  <circle cx="64" cy="42" r="14" fill="#ff6b6b"/>
  <!-- Eyes -->
  <circle cx="57" cy="38" r="4" fill="white"/>
  <circle cx="71" cy="38" r="4" fill="white"/>
  <circle cx="58" cy="37" r="2" fill="#1a1a2e"/>
  <circle cx="72" cy="37" r="2" fill="#1a1a2e"/>
  <!-- Eye shine -->
  <circle cx="59" cy="36" r="0.8" fill="white"/>
  <circle cx="73" cy="36" r="0.8" fill="white"/>
  <!-- Smile -->
  <path d="M59 44 Q64 49 69 44" fill="none" stroke="#1a1a2e" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Antennae -->
  <path d="M57 32 Q50 18 42 14" fill="none" stroke="#ff6b6b" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M71 32 Q78 18 86 14" fill="none" stroke="#ff6b6b" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="42" cy="14" r="3" fill="#ffd93d"/>
  <circle cx="86" cy="14" r="3" fill="#ffd93d"/>
  <!-- Claws (left) -->
  <path d="M42 52 Q32 46 28 50 Q24 54 30 58 Q26 56 24 60 Q22 66 30 64 L42 58" fill="#ff6b6b" stroke="#ee5a24" stroke-width="1"/>
  <!-- Claws (right) -->
  <path d="M86 52 Q96 46 100 50 Q104 54 98 58 Q102 56 104 60 Q106 66 98 64 L86 58" fill="#ff6b6b" stroke="#ee5a24" stroke-width="1"/>
  <!-- Tail segments -->
  <ellipse cx="64" cy="72" rx="18" ry="6" fill="#ee5a24"/>
  <ellipse cx="64" cy="78" rx="14" ry="5" fill="#e84118"/>
  <ellipse cx="64" cy="83" rx="10" ry="4" fill="#c23616"/>
  <!-- Tail fin -->
  <path d="M54 86 Q50 94 54 96 Q58 94 64 96 Q70 94 74 96 Q78 94 74 86" fill="#c23616"/>
  <!-- API text -->
  <text x="64" y="116" text-anchor="middle" font-family="Arial,sans-serif" font-weight="bold" font-size="18" fill="white" letter-spacing="2">GAPI</text>
</svg>
